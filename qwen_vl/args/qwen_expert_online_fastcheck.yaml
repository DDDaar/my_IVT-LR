project: ivtlr
save_path: ./output
name: placeholder_name

dataset_name: scienceqa

model_type: "2B"
model_path_2b: "/home/ma-user/work/lbx/models/Qwen2-VL-2B-Instruct" # 请修改为实际2B模型路径
model_path_7b: "/home/ma-user/work/lbx/models/Qwen2-VL-7B-Instruct" # 请修改为实际7B模型路径

suffix: "_expert_online_fastcheck"

epochs_per_stage: 4
max_latent_stage: 3
pad_latent_to_max: True

load_model_path: None
seed: 0
resume: 0
bf16: True
batch_size_training: 2
gradient_accumulation_steps: 1
num_epochs: 16
lr: !!float "4e-5"

# Also reduce dataset at the dataset-loading level.
debug: True

expert:
  enabled: True
  experts: ["sam"]
  # experts: ["sam",, "depth","dinov2"]

  token_strings:
    sam: "<|sam_feature|>"
    dinov2: "<|dinov2_feature|>"
    depth: "<|depth_feature|>"

  slots:
    sam: 4
    dinov2: 2
    depth: 2

  prefix_text:
    sam: "because the sam feature is "
    dinov2: "because the dinov2 feature is "
    depth: "because the depth feature is "

  align:
    enabled: True
    weight: 0.1
    loss: "mse"
    normalize_teacher: True
    normalize_student: True

  teacher:
    mode: "online"
    online:
      models:
        sam: "vit_h"
        dinov2: "dinov2-base"
        depth: "depth_anything_v2_vitl"

  # Quick validation mode:
  # - shrink dataset further
  # - optionally force the "final stage" formatting behavior
  # - after training, automatically run generation on training samples and validate that:
  #   expert tokens appear before "Therefore, the answer is ..."
  format_overfit_test:
    enabled: True
    dataset_size: 200
    num_epochs: 16
    check_samples: 8
    stage: "skip_all_steps"

