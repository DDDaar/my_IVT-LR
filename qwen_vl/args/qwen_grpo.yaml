# =========================
# Qwen2-VL GRPO Config
# =========================

run_name: "m3cot_qwen2vl_grpo"
output_dir: "/home/ma-user/work/lbx/IVT-LR/qwen_vl/output_grpo/m3cot_qwen2vl_grpo"

# Dataset: m3cot or scienceqa
dataset_name: "m3cot"

# Fixed-seed subset for GRPO debugging/warm-start. Set -1 for full set.
k_samples: -1
seed: 42
num_proc: 1

# Keep latent placeholder style aligned with SFT final stage.
max_latent_stage: 3
pad_latent_to_max: true

# Model selection
model_type: "2B"  # "2B" or "7B"
model_path_2b: "/home/ma-user/work/lbx/models/Qwen2-VL-2B-Instruct"
model_path_7b: "/home/ma-user/work/lbx/models/Qwen2-VL-7B-Instruct"
# NPU compatibility: keep eager attention by default
attn_implementation: "sdpa"

# Must point to your previous SFT ckpt:
# 1) adapter directory (contains adapter_config.json), or
# 2) fp32 full state dict file, such as epoch_x_full_model_fp32.pth
sft_ckpt_path: "/home/ma-user/work/lbx/IVT-LR/qwen_vl/output/m3cot_qwen2vl_2B_IVTLR/epoch_16_full_model_fp32.pth"

# LoRA switch
use_lora: true

###初始条件，r=64，alpha=16
lora_r: 64
lora_alpha: 32
lora_dropout: 0.05
lora_bias: "none"
lora_target_modules:
  - "q_proj"
  - "k_proj"
  - "v_proj"
  - "o_proj"
  - "gate_proj"
  - "up_proj"
  - "down_proj"

# GRPO optimization
deepspeed: "/home/ma-user/work/lbx/IVT-LR/qwen_vl/ds_config_grpo.json"
bf16: true
gradient_checkpointing: true
disable_gc_for_ddp: false
# Keep aligned with SFT setting in checkpoint name: choose_8_topk
num_selected_patches: 32
ddp_find_unused_parameters: false
ddp_broadcast_buffers: false
min_ckpt_match_ratio: 0.30
learning_rate: 1e-5
weight_decay: 0.0
max_grad_norm: 1.0
warmup_ratio: 0.03
warmup_steps: 0
lr_scheduler_type: "cosine"

num_train_epochs: 1
per_device_train_batch_size: 1
num_generations: 8
gradient_accumulation_steps: 8

dataloader_num_workers: 0

# Rollout generation settings

max_completion_length: 256
min_completion_length: 1
max_prompt_length: null
# Monkeypatch-based IVTLR sampling controls
do_sample: true
temperature: 0.8
top_k: 50
top_p: 0.95
beta: 0.0
log_completions: true

# ACC reward only
reward_acc_weight: 1.0
reward_acc_correct: 1.0
reward_acc_wrong: 0.0
reward_acc_missing: 0.0

# Rollout verbose logging (each reward call item)
verbose_rollout_print: true
verbose_rollout_max_chars: 300
verbose_rollout_rank0_only: true

# Logging / checkpointing
logging_steps: 1
save_steps: 1000
save_total_limit: 3
report_to: "wandb"  # "wandb" or "none"
